name: Finalize native UI runtime documentation

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/finalize-native-ui-runtime-docs.yml

permissions:
  contents: write

concurrency:
  group: finalize-native-ui-runtime-docs
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      CARGO_TARGET_DIR: /tmp/turing-native-ui-docs-target
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Verify and run the documentation generator
        shell: bash
        run: |
          set -euo pipefail
          python3 -B -m py_compile tools/ui_runtime_docs_generator.py
          python3 -B tools/ui_runtime_docs_generator.py

      - name: Require the complete native UI surface
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/ui-runtime/README.md
          test -f docs/ui-runtime/machine/ui-framework-candidates.json
          test -f docs/ui-runtime/machine/ui-component-registry.json
          test -f docs/ui-runtime/machine/ui-performance-budgets.json
          test -f docs/ui-runtime/machine/pre-build-readiness.json
          test -f docs/research/native-ui-framework-evaluation-2026-07.md
          test -f docs/research/pre-build-readiness-audit-2026-07.md
          test -f docs/project-buildout/11-pre-build-readiness-and-first-implementation-plan.md
          test -f docs/templates/ui-framework-evaluation.md
          grep -q '25 detailed engineering books' tools/validate_blueprint.py
          grep -q '16 machine-readable registries' tools/validate_blueprint.py
          grep -q 'RQ-60' docs/blueprint-v1/22-research-program.md

      - name: Remove one-shot publication material
        shell: bash
        run: |
          rm -f tools/ui_runtime_docs_generator.py
          rm -f .github/workflows/finalize-native-ui-runtime-docs.yml
          test ! -e prototype/target
          test ! -e tools/__pycache__
          test ! -e transfer

      - name: Validate repository and prototype
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e prototype/target
          test ! -e tools/__pycache__

      - name: Commit the clean synchronized documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m 'Document native UI runtime and pre-build readiness'
          git push origin HEAD:main
