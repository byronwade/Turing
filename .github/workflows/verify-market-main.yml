name: Clean final verification branches

on:
  push:
    branches:
      - ops/verify-market-main
    paths:
      - .github/workflows/verify-market-main.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/verify-market-main
          fetch-depth: 0
          show-progress: false

      - name: Delete auxiliary cleanup branch
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin refs/heads/ops/cleanup-main-verification >/dev/null 2>&1; then
            git push origin --delete ops/cleanup-main-verification
          fi

      - name: Delete this verification branch
        shell: bash
        run: git push origin --delete ops/verify-market-main
