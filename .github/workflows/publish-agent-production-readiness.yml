name: Publish agent execution and production readiness documentation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: turing-agent-production-readiness-publication
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      (github.event_name == 'issues' && github.event.issue.title == 'Run Turing agent production readiness publication' && github.actor == github.repository_owner) ||
      (github.event_name == 'pull_request' && github.event.pull_request.title == 'Run Turing agent production readiness publication' && github.actor == github.repository_owner)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      CARGO_TARGET_DIR: /tmp/turing-agent-production-readiness-target
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct and verify the documentation generator
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'
          git fetch origin main ops/agent-production-readiness-docs
          git reset --hard origin/main

          mapfile -t parts < <(
            git ls-tree -r --name-only origin/ops/agent-production-readiness-docs transfer/agent-production \
              | grep 'payload-part-' \
              | sort
          )
          test "${#parts[@]}" -eq 16
          : > /tmp/turing-agent-production.b64
          for path in "${parts[@]}"; do
            git show "origin/ops/agent-production-readiness-docs:${path}" >> /tmp/turing-agent-production.b64
          done
          base64 --decode /tmp/turing-agent-production.b64 > /tmp/turing-agent-production.py.gz
          gzip --decompress --stdout /tmp/turing-agent-production.py.gz > /tmp/turing-agent-production.py
          printf '%s  %s\n' \
            '5d185653d2c99de01c2af46238249df2c9617434aa2a81e266261df881402200' \
            '/tmp/turing-agent-production.py' | sha256sum --check --strict
          python3 -B -m py_compile /tmp/turing-agent-production.py

      - name: Generate and synchronize canonical documentation
        shell: bash
        run: |
          set -euo pipefail
          if ! python3 -B /tmp/turing-agent-production.py > /tmp/turing-agent-production.log 2>&1; then
            cat /tmp/turing-agent-production.log
            exit 1
          fi
          cat /tmp/turing-agent-production.log

      - name: Require complete agent and production-readiness surface
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/ui-runtime/README.md
          test -f docs/agent-execution/README.md
          test -f docs/production-readiness/README.md
          test -f docs/agent-execution/machine/agent-capability-matrix.json
          test -f docs/agent-execution/machine/agent-run-manifest.schema.json
          test -f docs/agent-execution/machine/execution-task.schema.json
          test -f docs/production-readiness/machine/stable-scope.json
          test -f docs/production-readiness/machine/product-slos.json
          test -f docs/production-readiness/machine/release-gates.json
          test -f docs/production-readiness/machine/update-trust-roles.json
          test -f docs/production-readiness/machine/secure-development-controls.json
          test -f docs/research/agent-execution-production-readiness-audit-2026-07.md
          test -f docs/project-buildout/12-agent-execution-and-production-readiness.md
          grep -q 'ADR-0020' docs/blueprint-v1/17-architecture-decisions.md
          grep -q 'RQ-66' docs/blueprint-v1/22-research-program.md
          grep -q 'AEX-020' docs/agent-execution/machine/agent-capability-matrix.json
          grep -q 'PRG-020' docs/production-readiness/machine/release-gates.json
          grep -q 'SLO-016' docs/production-readiness/machine/product-slos.json
          grep -q 'SRC-015' docs/production-readiness/machine/secure-development-controls.json
          grep -q 'not_ready_for_production' docs/production-readiness/machine/release-gates.json
          grep -q '27 detailed engineering books' tools/validate_blueprint.py
          grep -q '30 machine-readable registries' tools/validate_blueprint.py

      - name: Remove failed and one-shot publication machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-native-ui-runtime-docs.yml
          rm -f .github/workflows/publish-native-ui-prebuild-docs-from-issue.yml
          rm -f .github/workflows/publish-native-ui-prebuild-docs.yml
          rm -f .github/workflows/publish-agent-production-readiness.yml
          rm -f tools/ui_runtime_docs_generator.py
          rm -f tools/generate_native_ui_docs.py
          rm -f tools/turing_agent_production_readiness_generator.py
          rm -rf transfer prototype/target tools/__pycache__ target coverage artifacts
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

      - name: Validate repository and executable prototype
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e prototype/target
          test ! -e tools/__pycache__
          test ! -e transfer

      - name: Commit clean canonical tree to main
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --quiet && {
            echo 'Expected synchronized documentation changes, but the tree is unchanged.' >&2
            exit 1
          }
          git commit -m 'Document agent execution and production readiness'
          git push origin HEAD:main

      - name: Remove known temporary branches and verify branch state
        shell: bash
        run: |
          set -euo pipefail
          branches=(
            ops/agent-production-readiness-docs
            ops/trigger-agent-production-readiness
            ops/native-ui-prebuild-docs
            ops/trigger-native-ui-docs
            ops/remove-stale-ci-branch-reference
          )
          for branch in "${branches[@]}"; do
            if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null 2>&1; then
              git push origin --delete "${branch}"
            fi
          done
          remaining=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | grep -v '^main$' || true)
          if test -n "$remaining"; then
            echo 'Unexpected non-main branches remain:' >&2
            echo "$remaining" >&2
            exit 1
          fi

      - name: Close operational triggers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue close 33 --repo '${{ github.repository }}' --reason completed \
            --comment 'Agent-execution, production-readiness, native-UI, README, Blueprint, governance, registry, and validation documentation was synchronized on main. Repository and Rust prototype checks passed, failed publication machinery was removed, and main is the only branch.' || true
          if test '${{ github.event_name }}' = 'pull_request'; then
            gh pr close '${{ github.event.pull_request.number }}' --repo '${{ github.repository }}' \
              --comment 'The checksum-verified documentation publication completed directly on main. This operational trigger branch was deleted and was never intended to merge.' || true
          fi
