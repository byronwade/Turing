name: Finalize WP-002 kernel and bounded IPC

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: finalize-wp002-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.title == 'Implement WP-002 kernel identities and bounded IPC' && github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      CARGO_TARGET_DIR: /tmp/turing-wp002-target
    steps:
      - name: Check out the WP-002 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Configure repository identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'

      - name: Reconstruct the checksum-verified implementation overlay
        shell: bash
        run: |
          set -euo pipefail
          cat transfer/wp002/part-*.txt | base64 --decode > /tmp/wp002-overlay.tar.gz
          printf '%s  %s\n' \
            'e8012af2c64f26ef7bf7862f74723753aa689c835e2413d76bf2320a81d668da' \
            '/tmp/wp002-overlay.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/wp002-overlay.tar.gz
          python3 -B tools/apply_wp002_docs.py
          python3 -B tools/generate_ipc.py

      - name: Format source and verify deterministic generation
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          python3 -B tools/generate_ipc.py --check

      - name: Remove publication-only material
        shell: bash
        run: |
          set -euo pipefail
          rm -rf transfer
          rm -f tools/apply_wp002_docs.py
          rm -f .github/workflows/finalize-wp002.yml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

      - name: Validate the clean WP-002 branch
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          python3 -B tools/validate_build_foundation.py
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets
          cargo run --locked -p turing-shell -- --self-test
          cargo run --locked -p xtask -- check
          test ! -e transfer
          test ! -e tools/apply_wp002_docs.py
          test ! -e target

      - name: Commit the clean implementation branch
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --quiet && {
            echo 'Expected WP-002 changes, but the clean tree is unchanged.' >&2
            exit 1
          }
          git commit -m 'Implement WP-002 kernel identities and bounded IPC'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
