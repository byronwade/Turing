name: Finalize market strategy validator hardening

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/harden-market-validator-main.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/harden-market-validator-main.yml

permissions:
  contents: write

concurrency:
  group: harden-market-validator-main
  cancel-in-progress: false

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct and apply reviewed hardening patch
        shell: bash
        run: |
          set -euo pipefail
          cat <<'B64' | base64 --decode > /tmp/harden_market_validator.py.xz
          
          B64
          echo "050652b4cb9c0d7e7136ecf90970f0a053ff500c9228c7ad1f6c703f74ba0542  /tmp/harden_market_validator.py.xz" | sha256sum --check -
          xz --decompress --stdout /tmp/harden_market_validator.py.xz > /tmp/harden_market_validator.py
          echo "0edf79ae0ccdb0b9a61ac9f5e783f62df3ea82c7898f7265e73329f80cc195b9  /tmp/harden_market_validator.py" | sha256sum --check -
          python3 -B - <<'PY'
          from pathlib import Path
          source = Path('/tmp/harden_market_validator.py').read_text(encoding='utf-8')
          compile(source, '/tmp/harden_market_validator.py', 'exec')
          PY
          python3 -B /tmp/harden_market_validator.py

      - name: Remove one-shot workflow and generated output
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/harden-market-validator-main.yml
          rm -rf prototype/target tools/__pycache__ target coverage artifacts

      - name: Validate clean repository and prototype
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-market-validator-main-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e .github/workflows/harden-market-validator-main.yml
          test ! -d prototype/target
          test ! -d tools/__pycache__

      - name: Commit clean hardening result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Harden market strategy validation controls"
          git push origin HEAD:main

      - name: Delete temporary and stale market branches
        shell: bash
        run: |
          set -euo pipefail
          for branch in docs/market-strategy-validator-hardening ops/trigger-market-validator docs/browser-market-gaps-v2; do
            if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null 2>&1; then
              git push origin --delete "${branch}"
            fi
          done
