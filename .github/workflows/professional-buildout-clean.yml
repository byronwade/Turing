name: Clean professional buildout publication

on:
  push:
    branches:
      - docs/professional-buildout-v2
    paths:
      - .gitignore
      - .github/workflows/professional-buildout-clean.yml

permissions:
  contents: write

concurrency:
  group: professional-buildout-clean
  cancel-in-progress: false

jobs:
  clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out publication branch
        uses: actions/checkout@v4
        with:
          ref: docs/professional-buildout-v2
          fetch-depth: 0
          show-progress: false

      - name: Remove generated artifacts and one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -rf prototype/target tools/__pycache__ target coverage artifacts
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          rm -f .github/workflows/professional-buildout-clean.yml

      - name: Validate without writing build products into the repository
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-professional-buildout-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -d prototype/target
          test ! -d tools/__pycache__

      - name: Commit clean repository state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Remove generated artifacts from professional buildout"
          git push origin HEAD:docs/professional-buildout-v2
