name: Finalize professional buildout hygiene

on:
  push:
    branches:
      - docs/professional-buildout-v2
    paths:
      - .github/workflows/professional-buildout-finalize.yml

permissions:
  contents: write

concurrency:
  group: professional-buildout-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out publication branch
        uses: actions/checkout@v4
        with:
          ref: docs/professional-buildout-v2
          fetch-depth: 0
          show-progress: false

      - name: Document and enforce generated-output hygiene
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')
          repository_map = root / 'docs/repository-map.md'
          text = repository_map.read_text(encoding='utf-8')
          marker = '- `.gitignore` owns generated build-output exclusion'
          if marker not in text:
              text = text.rstrip() + '\n\n## Generated build-output hygiene\n\n' + marker + ' for Rust `target/`, Python `__pycache__/` and bytecode, local editor state, coverage, traces, and temporary artifacts. Validation rejects tracked build output; CI uses an external `CARGO_TARGET_DIR`.\n'
              repository_map.write_text(text, encoding='utf-8')

          validator = root / 'tools/validate_blueprint.py'
          text = validator.read_text(encoding='utf-8')
          anchor = '    ROOT / "bootstrap",'
          additions = anchor + '\n    ROOT / "target",\n    ROOT / "prototype" / "target",\n    ROOT / "tools" / "__pycache__",'
          section = text[text.index('FORBIDDEN_LEGACY_PATHS'):text.index('MARKDOWN_LINK')]
          if 'ROOT / "prototype" / "target"' not in section:
              if anchor not in text:
                  raise SystemExit('validator hygiene anchor missing')
              text = text.replace(anchor, additions, 1)
              validator.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/professional-buildout-finalize.yml

      - name: Validate without repository-local build output
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-professional-final-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e prototype/target
          test ! -e tools/__pycache__

      - name: Commit final professional controls
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Enforce generated artifact hygiene"
          git push origin HEAD:docs/professional-buildout-v2
