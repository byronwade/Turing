name: Fix market research question identifiers

on:
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fix-market-research-question-identifiers
  cancel-in-progress: false

jobs:
  fix:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'issues' || github.event.issue.title == 'Run Turing market research ID correction')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Correct market research identifiers and strengthen validation
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          python3 -B - <<'PY'
          from pathlib import Path

          root = Path('.')
          research = root / 'docs/blueprint-v1/22-research-program.md'
          text = research.read_text(encoding='utf-8')
          old = '''- **RQ-45:** Does a project-native Space reduce resumption time, identity mistakes, and lost organization across longitudinal workflows?
          - **RQ-46:** What snapshot, retention, encryption, and restoration model provides useful Time Machine recovery without unsafe replay or sensitive over-retention?
          - **RQ-47:** Can users understand and safely control semantic resource attribution and lifecycle decisions under 30-tab pressure?
          - **RQ-48:** Does isolated capability-scoped Agent Mode reduce harmful actions and improve trust without unusable confirmation burden?
          - **RQ-49:** What migration and open-export coverage materially reduces browser switching cost while protecting credentials and profile integrity?
          - **RQ-50:** Do the Research Canvas, causal diagnostics, privacy receipts, selective sync, and collaboration improve task accuracy and continuity enough to justify their complexity?'''
          new = '''## RQ-49 — Project-native Spaces

          Does a project-native Space reduce resumption time, identity mistakes, and lost organization across longitudinal workflows?

          ## RQ-50 — Workspace Time Machine

          What snapshot, retention, encryption, and restoration model provides useful recovery without unsafe replay or sensitive over-retention?

          ## RQ-51 — Resource Truth Center

          Can users understand and safely control semantic resource attribution and lifecycle decisions under 30-tab pressure?

          ## RQ-52 — Trustworthy Agent Mode

          Does isolated capability-scoped Agent Mode reduce harmful actions and improve trust without unusable confirmation burden?

          ## RQ-53 — Migration and open export

          What migration and open-export coverage materially reduces browser switching cost while protecting credentials and profile integrity?

          ## RQ-54 — Research, causality, receipts, sync, and collaboration

          Do the Research Canvas, causal diagnostics, privacy receipts, selective sync, and collaboration improve task accuracy and continuity enough to justify their complexity?'''
          if old not in text:
              raise SystemExit('expected duplicate market research-question block was not found')
          research.write_text(text.replace(old, new, 1), encoding='utf-8')

          market = root / 'docs/market-strategy/README.md'
          market_text = market.read_text(encoding='utf-8')
          marker = '<!-- MARKET-RQ-ID-CORRECTION-2026-07 -->'
          if marker not in market_text:
              market_text = market_text.rstrip() + f'''\n\n{marker}\n## Research-question ownership\n\nMarket validation is owned by `RQ-49` through `RQ-54`. `RQ-45` through `RQ-48` remain assigned to professional project controls, reproducible environments, traceability, and sustainability. Research-question identifiers are globally unique and contiguous.\n'''
              market.write_text(market_text, encoding='utf-8')

          research_index = root / 'docs/research/README.md'
          index_text = research_index.read_text(encoding='utf-8')
          if marker not in index_text:
              index_text = index_text.rstrip() + f'''\n\n{marker}\n## Market research question range\n\nThe browser market and differentiation program uses `RQ-49` through `RQ-54`; earlier identifiers remain owned by their existing architecture and professional-buildout studies.\n'''
              research_index.write_text(index_text, encoding='utf-8')

          log = root / 'docs/research-log.md'
          log_text = log.read_text(encoding='utf-8')
          if marker not in log_text:
              log_text = log_text.rstrip() + f'''\n\n{marker}\n## 2026-07-16 — Research-question identifier correction\n\nRenumbered market-differentiation studies from the conflicting `RQ-45`–`RQ-50` range to `RQ-49`–`RQ-54`, preserving `RQ-45`–`RQ-48` for the professional-buildout program. Added a repository validator that requires globally unique, contiguous research-question headings. No research conclusion, requirement, risk, work package, implementation status, or support claim changed.\n'''
              log.write_text(log_text, encoding='utf-8')

          validator = root / 'tools/validate_blueprint.py'
          validator_text = validator.read_text(encoding='utf-8')
          if 'def check_research_question_ids()' not in validator_text:
              anchor = '\n\ndef check_policy_markers() -> None:'
              function = '''

          def check_research_question_ids() -> None:
              path = BLUEPRINT / "22-research-program.md"
              text = path.read_text(encoding="utf-8")
              ids = re.findall(r"^## RQ-(\\d{2})\\b", text, re.MULTILINE)
              if not ids:
                  fail("research program contains no RQ headings")
              expected = [f"{index:02d}" for index in range(1, int(ids[-1]) + 1)]
              if ids != expected:
                  fail(
                      "research-question headings must be globally unique and contiguous; "
                      f"expected RQ-01 through RQ-{expected[-1]}, found: "
                      + ", ".join(f"RQ-{item}" for item in ids)
                  )
          '''
              if anchor not in validator_text:
                  raise SystemExit('validator insertion anchor not found')
              validator_text = validator_text.replace(anchor, function + anchor, 1)
          call = '        check_research_question_ids()\n'
          if call not in validator_text:
              anchor = '        markdown_count, links_checked = check_markdown()\n'
              if anchor not in validator_text:
                  raise SystemExit('validator call anchor not found')
              validator_text = validator_text.replace(anchor, anchor + call, 1)
          validator.write_text(validator_text, encoding='utf-8')
          PY

      - name: Validate corrected repository and prototype
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-market-rq-fix-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e prototype/target
          test ! -e tools/__pycache__

      - name: Remove one-shot workflow and commit corrected main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-market-research-question-ids.yml
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m 'Correct market research identifiers and enforce uniqueness'
          git push origin HEAD:main
