name: Publish native UI and pre-build documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish-native-ui-prebuild-docs
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.title == 'Run final native UI documentation publication' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Configure and fetch publication payload
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'
          git fetch origin main ops/native-ui-prebuild-docs
          git reset --hard origin/main
          : > /tmp/generate_native_ui_docs.py
          mapfile -t parts < <(
            git ls-tree -r --name-only origin/ops/native-ui-prebuild-docs transfer/native-ui \
              | grep 'generator-part-' \
              | sort
          )
          test "${#parts[@]}" -eq 13
          for path in "${parts[@]}"; do
            git show "origin/ops/native-ui-prebuild-docs:${path}" >> /tmp/generate_native_ui_docs.py
          done
          printf '%s  %s\n' \
            'd3fe5624c6bf29276410dd2e4363c917c07b57c289158fed71d40e6a48d44539' \
            '/tmp/generate_native_ui_docs.py' | sha256sum --check --strict
          python3 -m py_compile /tmp/generate_native_ui_docs.py

      - name: Generate canonical documentation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cp /tmp/generate_native_ui_docs.py tools/generate_native_ui_docs.py
          if ! PYTHONDONTWRITEBYTECODE=1 python3 -B tools/generate_native_ui_docs.py > /tmp/turing-generator.log 2>&1; then
            cat /tmp/turing-generator.log
            {
              echo '### Native UI generator failure'
              echo
              echo '```text'
              tail -80 /tmp/turing-generator.log
              echo '```'
            } > /tmp/turing-generator-comment.md
            gh pr comment '${{ github.event.pull_request.number }}' \
              --repo '${{ github.repository }}' \
              --body-file /tmp/turing-generator-comment.md
            exit 1
          fi
          cat /tmp/turing-generator.log

      - name: Require synchronized native UI and readiness surface
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/ui-runtime/README.md
          test -f docs/ui-runtime/machine/framework-candidates.json
          test -f docs/ui-runtime/machine/ui-performance-budgets.json
          test -f docs/blueprint-v1/machine/pre-build-readiness.json
          test -f docs/research/native-ui-framework-evaluation-2026-07.md
          test -f docs/research/pre-build-readiness-gap-audit-2026-07.md
          test -f docs/project-buildout/11-pre-build-readiness-checklist.md
          test -f docs/templates/ui-framework-experiment.md
          grep -q 'ADR-0016' docs/blueprint-v1/17-architecture-decisions.md
          grep -q 'RQ-58' docs/blueprint-v1/22-research-program.md
          grep -q 'PB-020' docs/blueprint-v1/machine/pre-build-readiness.json
          grep -q '"selection_status": "not_selected"' docs/ui-runtime/machine/framework-candidates.json
          grep -q 'twenty-five detailed engineering and product books' README.md
          grep -q '25 detailed engineering books' tools/validate_blueprint.py
          grep -q '15 machine-readable registries' tools/validate_blueprint.py

      - name: Remove publication machinery and generated build output
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/generate_native_ui_docs.py
          rm -f .github/workflows/publish-native-ui-prebuild-docs-from-issue.yml
          rm -rf transfer prototype/target tools/__pycache__ target coverage artifacts
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

      - name: Validate repository and executable prototype
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-native-ui-docs-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e prototype/target
          test ! -e tools/__pycache__
          test ! -e transfer

      - name: Commit clean documentation tree to main
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --quiet && {
            echo 'Expected documentation changes, but the generated tree is unchanged.' >&2
            exit 1
          }
          git commit -m 'Document native UI architecture and pre-build readiness'
          git push origin HEAD:main

      - name: Remove temporary branches
        shell: bash
        run: |
          set -euo pipefail
          git push origin --delete ops/native-ui-prebuild-docs
          git push origin --delete ops/trigger-native-ui-docs || true

      - name: Close trigger pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr close '${{ github.event.pull_request.number }}' \
            --repo '${{ github.repository }}' \
            --comment 'Native UI and pre-build documentation was generated, validated, committed to main, and temporary branches were deleted.'
