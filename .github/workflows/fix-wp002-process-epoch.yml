name: Fix WP-002 process epoch reuse

on:
  push:
    branches:
      - agent/wp-002-kernel-ipc
    paths:
      - .github/workflows/fix-wp002-process-epoch.yml

permissions:
  contents: write

concurrency:
  group: fix-wp002-process-epoch
  cancel-in-progress: false

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      CARGO_TARGET_DIR: /tmp/turing-wp002-epoch-fix-target
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/wp-002-kernel-ipc
          fetch-depth: 0
          show-progress: false

      - name: Configure repository identity
        run: |
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'

      - name: Preserve monotonic process epochs across removal
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/turing-kernel/src/lib.rs')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              'use std::collections::BTreeMap;\nuse std::collections::btree_map::Entry;\n',
              'use std::collections::BTreeMap;\n',
              1,
          )

          text = text.replace(
              '    processes: BTreeMap<ProcessId, ProcessPolicy>,\n    channels: BTreeMap<ChannelId, ChannelState>,\n',
              '    processes: BTreeMap<ProcessId, ProcessPolicy>,\n    last_epochs: BTreeMap<ProcessId, ProcessEpoch>,\n    channels: BTreeMap<ChannelId, ChannelState>,\n',
              1,
          )

          text = text.replace(
              '            processes: BTreeMap::from([(kernel_id, policy)]),\n            channels: BTreeMap::new(),\n',
              '            processes: BTreeMap::from([(kernel_id, policy)]),\n            last_epochs: BTreeMap::from([(kernel_id, kernel.epoch())]),\n            channels: BTreeMap::new(),\n',
              1,
          )

          old_launch = '''        let identity = ProcessIdentity::new(
            child_id,
            ProcessEpoch::new(1).expect("one is a valid process epoch"),
        );
        match self.processes.entry(child_id) {
            Entry::Vacant(entry) => {
                entry.insert(ProcessPolicy {
                    identity,
                    role: child_role,
                    capabilities,
                });
                Ok(identity)
            }
            Entry::Occupied(_) => Err(KernelError::DuplicateProcessId { id: child_id }),
        }
'''
          new_launch = '''        if self.processes.contains_key(&child_id) {
            return Err(KernelError::DuplicateProcessId { id: child_id });
        }
        let epoch = match self.last_epochs.get(&child_id).copied() {
            Some(last) => last
                .checked_next()
                .ok_or(KernelError::ProcessEpochExhausted { id: child_id })?,
            None => ProcessEpoch::new(1).expect("one is a valid process epoch"),
        };
        let identity = ProcessIdentity::new(child_id, epoch);
        self.processes.insert(
            child_id,
            ProcessPolicy {
                identity,
                role: child_role,
                capabilities,
            },
        );
        self.last_epochs.insert(child_id, epoch);
        Ok(identity)
'''
          if old_launch not in text:
              raise SystemExit('launch replacement anchor not found')
          text = text.replace(old_launch, new_launch, 1)

          text = text.replace(
              '''        self.processes.insert(
            current.id(),
            ProcessPolicy {
                identity: next,
                role: policy.role(),
                capabilities: policy.capabilities(),
            },
        );
        self.channels
''',
              '''        self.processes.insert(
            current.id(),
            ProcessPolicy {
                identity: next,
                role: policy.role(),
                capabilities: policy.capabilities(),
            },
        );
        self.last_epochs.insert(current.id(), next_epoch);
        self.channels
''',
              1,
          )

          test_anchor = '''    #[test]
    fn generated_route_and_capability_are_enforced() {
'''
          test = '''    #[test]
    fn removed_process_id_uses_a_new_epoch_and_rejects_stale_replay() {
        let mut registry = ProcessRegistry::new(ProcessId::new(1).expect("valid kernel id"));
        let kernel = registry.kernel();
        let renderer = registry
            .launch(
                kernel,
                ProcessId::new(2).expect("valid renderer id"),
                ProcessRole::Renderer,
            )
            .expect("kernel launches renderer");
        let channel = ChannelId::new(1).expect("valid channel");
        registry
            .register_channel(kernel, channel, renderer, kernel)
            .expect("kernel registers channel");
        let stale = envelope(MessageKind::NavigationIntent, renderer, kernel, 1, 1);

        registry
            .remove(kernel, renderer)
            .expect("kernel removes renderer");
        let replacement = registry
            .launch(kernel, renderer.id(), ProcessRole::Renderer)
            .expect("kernel relaunches renderer id");
        assert_eq!(replacement.id(), renderer.id());
        assert!(replacement.epoch() > renderer.epoch());
        registry
            .register_channel(kernel, channel, replacement, kernel)
            .expect("kernel reuses channel for replacement identity");

        assert!(matches!(
            registry.authorize(&stale),
            Err(KernelError::StaleProcess { current, supplied })
                if current == replacement && supplied == renderer
        ));
        let fresh = envelope(MessageKind::NavigationIntent, replacement, kernel, 1, 1);
        registry
            .authorize(&fresh)
            .expect("replacement starts a fresh authenticated sequence");
    }

'''
          if test_anchor not in text:
              raise SystemExit('test insertion anchor not found')
          text = text.replace(test_anchor, test + test_anchor, 1)
          path.write_text(text, encoding='utf-8')

          task_path = Path('docs/agent-execution/machine/tasks/TASK-000001.json')
          task = task_path.read_text(encoding='utf-8')
          task = task.replace(
              '    "stale process epoch",\n',
              '    "stale process epoch",\n    "remove and relaunch cannot resurrect a prior process identity",\n',
              1,
          )
          task_path.write_text(task, encoding='utf-8')

          report_path = Path('docs/research/wp-002-kernel-ipc-2026-07.md')
          report = report_path.read_text(encoding='utf-8')
          marker = '## Residual limitations\n'
          note = '''## Process-ID reuse hardening\n\nThe kernel retains the last issued epoch for every allocated `ProcessId`, including removed processes. Relaunching a previously used ID advances the epoch rather than resetting it, so stale handles and envelopes cannot become current again when process and channel identifiers are reused. A regression test covers launch, channel registration, removal, relaunch, stale replay rejection, and fresh-sequence acceptance.\n\n'''
          if note not in report:
              if marker not in report:
                  raise SystemExit('report insertion anchor not found')
              report = report.replace(marker, note + marker, 1)
          report_path.write_text(report, encoding='utf-8')
          PY

      - name: Format and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/generate_ipc.py --check
          cargo fmt --all -- --check || cargo fmt --all
          python3 -B tools/validate_blueprint.py
          python3 -B tools/validate_build_foundation.py
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-targets --all-features --locked
          cargo run --locked -p turing-shell -- --self-test
          cargo run --locked -p xtask -- check

      - name: Commit the hardened implementation
        shell: bash
        run: |
          set -euo pipefail
          git add crates/turing-kernel/src/lib.rs \
            docs/agent-execution/machine/tasks/TASK-000001.json \
            docs/research/wp-002-kernel-ipc-2026-07.md
          git diff --cached --quiet && {
            echo 'Expected the epoch-reuse fix to modify the branch.' >&2
            exit 1
          }
          git commit -m 'Prevent process identity resurrection after removal'
          git push origin HEAD:agent/wp-002-kernel-ipc
