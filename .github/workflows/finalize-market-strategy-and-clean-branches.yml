name: Finalize market strategy and clean branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/finalize-market-strategy-and-clean-branches.yml

permissions:
  contents: write

concurrency:
  group: finalize-market-strategy-and-clean-branches
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Require canonical market strategy surface
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/market-strategy/README.md
          test -f docs/market-strategy/machine/feature-opportunities.json
          test -f docs/research/browser-market-gap-2026-07.md
          test -f docs/templates/market-opportunity.md
          grep -q '24 detailed engineering books' tools/validate_blueprint.py
          grep -q '12 machine-readable registries' tools/validate_blueprint.py
          grep -q '"scope": "product"' docs/blueprint-v1/machine/professional-owners.json
          grep -q '"scope": "market-strategy"' docs/blueprint-v1/machine/professional-owners.json
          grep -q '"release-operations"' docs/blueprint-v1/machine/professional-review-rules.json
          test ! -e transfer
          test ! -e prototype/target
          test ! -e tools/__pycache__

      - name: Validate repository and prototype cleanly
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-final-market-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e prototype/target
          test ! -e tools/__pycache__

      - name: Remove all known merged, abandoned, verification, and cleanup branches
        shell: bash
        run: |
          set -euo pipefail
          branches=(
            agent/bootstrap-browser-program
            docs/research-wave2-transfer
            docs/research-wave3-publish
            docs/technology-plugins-embedding
            docs/professional-buildout
            docs/professional-buildout-v2
            docs/market-strategy-integration
            docs/market-strategy-consistency
            ops/finalize-market-strategy
            ops/cleanup-stale-doc-branches
            ops/cleanup-market-consistency
            ops/verify-market-main
            ops/cleanup-main-verification
          )
          : > /tmp/turing-remaining-branches
          for branch in "${branches[@]}"; do
            if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null 2>&1; then
              if ! git push origin --delete "${branch}"; then
                echo "${branch}" >> /tmp/turing-remaining-branches
              fi
            fi
          done
          for branch in "${branches[@]}"; do
            if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null 2>&1; then
              grep -qxF "${branch}" /tmp/turing-remaining-branches || echo "${branch}" >> /tmp/turing-remaining-branches
            fi
          done
          if test -s /tmp/turing-remaining-branches; then
            echo 'The following branches could not be removed:' >&2
            cat /tmp/turing-remaining-branches >&2
            exit 1
          fi

      - name: Remove one-shot workflow and commit clean main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-market-strategy-and-clean-branches.yml
          git config user.name 'turing-research[bot]'
          git config user.email 'turing-research[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m 'Finalize market strategy documentation and branch cleanup'
          git push origin HEAD:main
