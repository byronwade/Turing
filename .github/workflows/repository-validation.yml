name: Repository validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      CARGO_TARGET_DIR: /tmp/turing-repository-validation-target

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Show pinned environment
        run: |
          rustc --version
          cargo --version
          rustfmt --version
          cargo clippy --version
          python3 --version
          git --version

      - name: Run read-only doctor
        run: cargo run --locked -p xtask -- doctor --ci

      - name: Validate documentation and program records
        shell: bash
        run: |
          set +e
          python3 -B tools/validate_blueprint.py > repository-validation.log 2>&1
          status=$?
          cat repository-validation.log
          exit "$status"

      - name: Validate executable build foundation
        shell: bash
        run: |
          set +e
          python3 -B tools/validate_build_foundation.py > build-foundation-validation.log 2>&1
          status=$?
          cat build-foundation-validation.log
          exit "$status"

      - name: Validate sandbox planning contracts
        shell: bash
        run: |
          set +e
          python3 -B tools/validate_sandbox_contracts.py > sandbox-contract-validation.log 2>&1
          status=$?
          cat sandbox-contract-validation.log
          exit "$status"

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-${{ github.run_id }}
          path: |
            repository-validation.log
            build-foundation-validation.log
            sandbox-contract-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce same-change documentation
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 -B tools/check_documentation_change.py "$BASE_SHA" "$HEAD_SHA"

      - name: Format workspace
        shell: bash
        run: |
          set +e
          cargo fmt --all -- --check > rustfmt.log 2>&1
          status=$?
          cat rustfmt.log
          exit "$status"

      - name: Upload formatting diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-${{ github.run_id }}
          path: rustfmt.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Lint workspace
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings > clippy.log 2>&1
          status=$?
          cat clippy.log
          exit "$status"

      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-${{ github.run_id }}
          path: clippy.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test workspace
        run: cargo test --workspace --all-targets --locked

      - name: Run shell self-test
        run: cargo run --locked -p turing-shell -- --self-test

      - name: Run architecture prototype
        run: cargo run --locked -p turing-architecture-prototype --quiet

      - name: Enforce clean source tree
        run: |
          test ! -e target
          test ! -e prototype/target
          test ! -e tools/__pycache__
          test ! -e transfer
