name: Finalize technology Plug-in and embedding docs on main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/research-wave4-main-finalize.yml

permissions:
  contents: write

concurrency:
  group: research-wave4-main-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Materialize the reviewed documentation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin docs/technology-plugins-embedding

          if test -f docs/technology-stack/README.md \
             && test -f docs/plugins/README.md \
             && test -f docs/embedding/README.md; then
            echo "The generated documentation is already on main."
          elif git cat-file -e origin/docs/technology-plugins-embedding:docs/technology-stack/README.md \
            && git cat-file -e origin/docs/technology-plugins-embedding:docs/plugins/README.md \
            && git cat-file -e origin/docs/technology-plugins-embedding:docs/embedding/README.md; then
            echo "Importing the clean generated documentation tree from the publication branch."
            git checkout origin/docs/technology-plugins-embedding -- \
              README.md AGENTS.md CONTRIBUTING.md SECURITY.md docs \
              tools/validate_blueprint.py \
              .github/ISSUE_TEMPLATE/engineering.yml \
              .github/pull_request_template.md
          else
            echo "Reconstructing the checksum-verified reviewed generator."
            mkdir -p tools
            : > tools/research_wave4_generator.py
            git show origin/docs/technology-plugins-embedding:transfer/research-wave4/source-00 >> tools/research_wave4_generator.py
            printf "'\n" >> tools/research_wave4_generator.py
            for part in {01..12}; do
              git show "origin/docs/technology-plugins-embedding:transfer/research-wave4/source-${part}" >> tools/research_wave4_generator.py
            done
            echo "3e9c10f87dbda366d0d54825bc9e0e3aa2b7835b9840e7f29e50eb16edcd2b4d  tools/research_wave4_generator.py" | sha256sum --check -
            python3 -m py_compile tools/research_wave4_generator.py
            python3 tools/research_wave4_generator.py
          fi

      - name: Require the complete research surface
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/technology-stack/README.md
          test -f docs/plugins/README.md
          test -f docs/embedding/README.md
          test -f docs/research/chrome-extension-demand-reference-2026-07.md
          test -f docs/research/technology-plugins-embedding-audit-2026-07.md
          grep -q '22 detailed engineering books' tools/validate_blueprint.py

      - name: Remove one-shot material
        shell: bash
        run: |
          rm -f tools/research_wave4_generator.py
          rm -f .github/workflows/research-wave4-main-finalize.yml
          test ! -e transfer/research-wave4

      - name: Validate clean repository and prototype
        run: |
          python3 tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet

      - name: Commit only the clean documentation tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Document technology stack Plug-ins and embedding SDKs"
          git push origin HEAD:main
