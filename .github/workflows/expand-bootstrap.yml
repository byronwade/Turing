name: Expand browser program bootstrap

on:
  push:
    branches:
      - agent/bootstrap-browser-program
    paths:
      - bootstrap/**
      - .github/workflows/expand-bootstrap.yml

permissions:
  contents: write

jobs:
  expand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out bootstrap branch
        uses: actions/checkout@v4

      - name: Reconstruct and verify repository snapshot
        shell: bash
        run: |
          cat bootstrap/part-* | base64 --decode > /tmp/turing-browser-bootstrap.tar.gz
          echo "4a9e2e39565f43774ce328ed043d0d04d2526d8a5e2b3ab1600e9443760d7ec6  /tmp/turing-browser-bootstrap.tar.gz" | sha256sum --check -
          tar -xzf /tmp/turing-browser-bootstrap.tar.gz
          rm -rf bootstrap .github/workflows/expand-bootstrap.yml

      - name: Commit expanded source tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Expand Turing browser program bootstrap [skip ci]"
          git push
