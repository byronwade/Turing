name: Harden market strategy validation

on:
  push:
    branches:
      - docs/market-strategy-validator-hardening
    paths:
      - tools/harden_market_validator.py
      - .github/workflows/market-validator-hardening.yml

permissions:
  contents: write

concurrency:
  group: market-validator-hardening
  cancel-in-progress: false

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v4
        with:
          ref: docs/market-strategy-validator-hardening
          fetch-depth: 0
          show-progress: false

      - name: Apply validator and governance hardening
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/harden_market_validator.py

      - name: Remove one-shot files
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/harden_market_validator.py
          rm -f .github/workflows/market-validator-hardening.yml
          rm -rf prototype/target tools/__pycache__ target coverage artifacts

      - name: Validate clean repository and prototype
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-market-validator-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e tools/harden_market_validator.py
          test ! -e .github/workflows/market-validator-hardening.yml
          test ! -d prototype/target
          test ! -d tools/__pycache__

      - name: Commit clean hardening change
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Harden market strategy validation controls"
          git push origin HEAD:docs/market-strategy-validator-hardening
