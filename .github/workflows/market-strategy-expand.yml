name: Integrate market strategy documentation

on:
  push:
    branches:
      - docs/market-strategy-integration
    paths:
      - transfer/market-strategy/**
      - .github/workflows/market-strategy-expand.yml

permissions:
  contents: write

concurrency:
  group: market-strategy-integration
  cancel-in-progress: false

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: docs/market-strategy-integration
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct and verify generator
        shell: bash
        run: |
          set -euo pipefail
          cat transfer/market-strategy/source-* | base64 --decode > /tmp/market_strategy_generator.py.xz
          echo "b061632140458c47699feb558134fd8f96f7452ca55a9a7f25feff21152f8e75  /tmp/market_strategy_generator.py.xz" | sha256sum --check -
          xz --decompress --stdout /tmp/market_strategy_generator.py.xz > /tmp/market_strategy_generator.py
          echo "b8f960a93ba7aebed0bc3898d0270ec41905638ecc12e41a562549c181ace992  /tmp/market_strategy_generator.py" | sha256sum --check -
          python3 -B - <<'PY'
          from pathlib import Path
          source = Path('/tmp/market_strategy_generator.py').read_text(encoding='utf-8')
          compile(source, '/tmp/market_strategy_generator.py', 'exec')
          PY

      - name: Generate synchronized market strategy documentation
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/market_strategy_generator.py tools/market_strategy_generator.py
          python3 -B tools/market_strategy_generator.py

      - name: Remove one-shot publication material
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/market_strategy_generator.py
          rm -rf transfer/market-strategy
          rmdir transfer 2>/dev/null || true
          rm -f .github/workflows/market-strategy-expand.yml
          rm -rf prototype/target tools/__pycache__ target coverage artifacts

      - name: Validate clean repository and prototype
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-market-strategy-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e transfer/market-strategy
          test ! -e tools/market_strategy_generator.py
          test ! -e .github/workflows/market-strategy-expand.yml
          test ! -d prototype/target
          test ! -d tools/__pycache__

      - name: Commit clean documentation tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Integrate market strategy and product opportunities"
          git push origin HEAD:docs/market-strategy-integration
