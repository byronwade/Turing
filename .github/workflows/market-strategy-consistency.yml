name: Correct market strategy documentation consistency

on:
  push:
    branches:
      - docs/market-strategy-consistency
    paths:
      - tools/market_consistency_patch.py
      - .github/workflows/market-strategy-consistency.yml

permissions:
  contents: write

concurrency:
  group: market-strategy-consistency
  cancel-in-progress: false

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out consistency branch
        uses: actions/checkout@v4
        with:
          ref: docs/market-strategy-consistency
          fetch-depth: 0
          show-progress: false

      - name: Apply consistency corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/market_consistency_patch.py

      - name: Remove one-shot files
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/market_consistency_patch.py
          rm -f .github/workflows/market-strategy-consistency.yml
          rm -rf prototype/target tools/__pycache__ target coverage artifacts

      - name: Validate clean repository and prototype
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          CARGO_TARGET_DIR: /tmp/turing-market-consistency-target
        run: |
          set -euo pipefail
          python3 -B tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet
          test ! -e tools/market_consistency_patch.py
          test ! -e .github/workflows/market-strategy-consistency.yml
          test ! -d prototype/target
          test ! -d tools/__pycache__

      - name: Commit consistency corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Harden market strategy documentation consistency"
          git push origin HEAD:docs/market-strategy-consistency
