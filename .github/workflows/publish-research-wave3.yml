name: Publish research wave 3

on:
  push:
    branches:
      - main
    paths:
      - tools/research_wave3_generator.py

permissions:
  contents: write

concurrency:
  group: publish-research-wave3
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Generate the research library
        run: python3 tools/research_wave3_generator.py

      - name: Remove one-shot publication machinery
        run: |
          rm -f tools/research_wave3_generator.py
          rm -f .github/workflows/publish-research-wave3.yml

      - name: Validate repository and prototype
        run: |
          python3 tools/validate_blueprint.py
          cargo fmt --manifest-path prototype/Cargo.toml -- --check
          cargo test --manifest-path prototype/Cargo.toml --all-targets
          cargo run --manifest-path prototype/Cargo.toml --quiet

      - name: Commit clean generated documentation
        run: |
          git config user.name "turing-research[bot]"
          git config user.email "turing-research[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "Expand performance security and developer research"
          git push origin HEAD:main
