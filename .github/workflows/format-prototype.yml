name: One-shot Rust prototype formatter

on:
  pull_request:
    branches:
      - main
    paths:
      - prototype/**/*.rs
      - prototype/Cargo.toml
      - .github/workflows/format-prototype.yml

permissions:
  contents: write

concurrency:
  group: format-turing-prototype
  cancel-in-progress: false

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/bootstrap-browser-program'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-browser-program
          fetch-depth: 0

      - name: Format the Rust prototype
        run: cargo fmt --manifest-path prototype/Cargo.toml

      - name: Commit formatting when needed
        shell: bash
        run: |
          git config user.name "turing-format[bot]"
          git config user.email "turing-format[bot]@users.noreply.github.com"
          git add prototype
          if git diff --cached --quiet; then
            echo "Prototype already formatted"
            exit 0
          fi
          git commit -m "Format Rust architecture prototype"
          git push origin HEAD:agent/bootstrap-browser-program
