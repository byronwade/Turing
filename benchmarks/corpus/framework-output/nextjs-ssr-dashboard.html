<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { background: hsl(222, 47%, 11%); color: hsl(210, 40%, 96%); margin: 0; }
.app { padding: 24px; }
.header { background: hsl(217, 33%, 17%); border-radius: 12px; padding: 16px; margin: 0 0 16px 0; }
.title { color: white; text-align: left; }
.grid { display: block; }
.card { background: hsl(217, 33%, 17%); border-color: hsl(215, 20%, 35%); border-width: 1px; border-radius: 10px; padding: 16px; margin: 0 0 12px 0; }
.metric { color: hsl(160, 84%, 55%); }
.label { color: hsl(215, 20%, 65%); }
.cta { background: hsl(221, 83%, 53%); color: white; border-radius: 8px; padding: 12px; text-align: center; margin: 8px 0 0 0; }
</style>
</head>
<body>
<div class='app'>
  <div class='header'>
    <div class='title'>Turing Analytics</div>
  </div>
  <div class='grid'>
    <div class='card'>
      <div class='label'>Total Revenue</div>
      <div class='metric'>$284,120</div>
    </div>
    <div class='card'>
      <div class='label'>Active Users</div>
      <div class='metric'>18,204</div>
    </div>
    <div class='card'>
      <div class='label'>Conversion Rate</div>
      <div class='metric'>3.8 percent</div>
      <div class='cta'>View full report</div>
    </div>
  </div>
</div>
</body>
</html>
