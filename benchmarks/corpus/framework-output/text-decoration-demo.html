<!DOCTYPE html>
<html><head><style>
body { background: white; margin: 20px; }
.underline { text-decoration: underline; color: navy; margin: 0 0 8px 0; }
.strike { text-decoration: line-through; color: crimson; margin: 0 0 8px 0; }
.plain { color: black; }
</style></head>
<body>
<div class='underline'>This text is underlined</div>
<div class='strike'>This text has a line through it</div>
<div class='plain'>This text is plain</div>
</body>
</html>
