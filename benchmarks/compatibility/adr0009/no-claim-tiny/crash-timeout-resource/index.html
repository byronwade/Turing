<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ADR-0009 Crash Timeout Resource Fixture</title>
  </head>
  <body data-adr9-case="ADR9-COMPAT-CRASH-TIMEOUT-001">
    <main>
      <h1>Crash Timeout Resource Fixture</h1>
      <p>
        This page declares fault-denominator targets without triggering an
        intentional hang, crash, or resource exhaustion during ordinary loading.
      </p>
      <ul id="fault-denominator">
        <li data-fault="timeout">timeout</li>
        <li data-fault="hang">hang</li>
        <li data-fault="crash">crash</li>
        <li data-fault="recovery-failure">recovery-failure</li>
        <li data-fault="artifact-missing">artifact-missing</li>
      </ul>
      <pre id="fault-log">pending</pre>
    </main>
    <script>
      const faults = Array.from(document.querySelectorAll("[data-fault]"))
        .map((item) => item.dataset.fault);
      document.querySelector("#fault-log").textContent = JSON.stringify({
        claim: "no compatibility claim",
        faultInjectionExecuted: false,
        denominator: faults,
      });
    </script>
  </body>
</html>
